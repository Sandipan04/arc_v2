<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NISER Archive</title>

        <!-- 1. External Frameworks -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <!-- 2. Modular CSS -->
        <link rel="stylesheet" href="./css/global.css" />
        <link rel="stylesheet" href="./css/index.css" />
    </head>
    <body>
        <!-- Fixed Navbar -->
        <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
            <div class="container">
                <a class="navbar-brand" href="/">NISER Archive</a>
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarCollapse"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarCollapse">
                    <ul class="navbar-nav me-auto mb-2 mb-md-0">
                        <li class="nav-item">
                            <a class="nav-link active" href="/">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/debug.html">Debug</a>
                        </li>
                    </ul>
                    <div class="d-flex align-items-center">
                        <button
                            id="sign-in-btn"
                            class="btn btn-outline-light me-2 hidden"
                        >
                            Sign In
                        </button>
                        <div id="user-button-mount"></div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="container mb-5">
            <!-- Hero Section -->
            <div class="hero-section">
                <h1 class="display-5 fw-bold">Academic Archive</h1>
                <p class="col-md-8 mx-auto fs-5 text-muted">
                    A student-driven repository for past assignments, quizzes,
                    exams, and notes.
                </p>
                <div class="d-flex justify-content-center mt-4">
                    <input
                        type="text"
                        class="form-control w-50 shadow-sm"
                        placeholder="Search courses (e.g., M101)..."
                        id="search-input"
                    />
                    <button class="btn btn-primary ms-2 shadow-sm">
                        Search
                    </button>
                </div>
            </div>

            <!-- Auth Alert (Only shows if logged in but pending/incomplete) -->
            <div
                id="auth-alert"
                class="alert alert-warning hidden"
                role="alert"
            >
                <span id="auth-alert-text"></span>
            </div>

            <!-- Schools Grid -->
            <h2 class="mb-4 border-bottom pb-2">Browse by School</h2>

            <div id="schools-loading" class="text-center py-4">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>

            <div class="row g-4" id="schools-grid">
                <!-- School cards will be dynamically injected here -->
            </div>

            <div
                id="schools-error"
                class="alert alert-danger hidden mt-3"
                role="alert"
            ></div>

            <!-- Comments Mount Point -->
            <div id="comments-mount"></div>
        </main>

        <!-- Sticky Footer -->
        <footer class="footer">
            <div class="container text-center text-muted">
                <small>Maintained by the student community.</small>
            </div>
        </footer>

        <!-- 3. Modular JS Entry Point -->
        <script type="module" src="./js/index.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
