<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Course Iteration | NISER Archive</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./css/global.css" />
        <link rel="stylesheet" href="./css/sidebar.css" />
    </head>
    <body>
        <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
            <div class="container">
                <a class="navbar-brand" href="/">NISER Archive</a>
                <div class="d-flex align-items-center ms-auto">
                    <button
                        id="sign-in-btn"
                        class="btn btn-outline-light btn-sm me-3 hidden"
                    >
                        Sign In
                    </button>
                    <div id="user-button-mount"></div>
                </div>
            </div>
        </nav>

        <div class="container-fluid" style="margin-top: 56px">
            <!-- Mobile Toggle Button (Visible only on small screens) -->
            <div
                class="d-md-none py-2 border-bottom bg-white sticky-top"
                style="top: 56px; z-index: 1020"
            >
                <button
                    class="btn btn-light w-100 d-flex justify-content-between align-items-center"
                    type="button"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#sidebarMenu"
                    aria-controls="sidebarMenu"
                >
                    <span class="fw-bold text-muted">📁 Browse Directory</span>
                    <span>☰</span>
                </button>
            </div>

            <div class="row">
                <!-- Responsive Sidebar: Acts as an offcanvas drawer on mobile, and a standard column on desktop -->
                <nav
                    class="col-md-3 col-lg-2 offcanvas-md offcanvas-start sidebar-container"
                    tabindex="-1"
                    id="sidebarMenu"
                    aria-labelledby="sidebarMenuLabel"
                >
                    <div class="offcanvas-header d-md-none border-bottom">
                        <h5
                            class="offcanvas-title fw-bold text-primary"
                            id="sidebarMenuLabel"
                        >
                            Archive Directory
                        </h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="offcanvas"
                            data-bs-target="#sidebarMenu"
                            aria-label="Close"
                        ></button>
                    </div>
                    <div class="offcanvas-body flex-column pt-md-0">
                        <h6
                            class="d-none d-md-block text-muted fw-bold text-uppercase mb-3 px-2"
                        >
                            Directory
                        </h6>
                        <div id="sidebar-mount" class="w-100"></div>
                    </div>
                </nav>

                <!-- Main Content Column -->
                <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4 mb-5">
                    <nav aria-label="breadcrumb" class="mb-4">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item">
                                <a href="/" class="text-decoration-none"
                                    >Home</a
                                >
                            </li>
                            <li class="breadcrumb-item">
                                <a
                                    href="#"
                                    id="school-link"
                                    class="text-decoration-none"
                                    >School</a
                                >
                            </li>
                            <li class="breadcrumb-item">
                                <a
                                    href="#"
                                    id="course-link"
                                    class="text-decoration-none"
                                    >Course</a
                                >
                            </li>
                            <li
                                class="breadcrumb-item active"
                                aria-current="page"
                                id="iter-breadcrumb"
                            >
                                Iteration
                            </li>
                        </ol>
                    </nav>

                    <div
                        class="p-4 mb-4 bg-light rounded-3 shadow-sm border d-flex justify-content-between align-items-center"
                    >
                        <div>
                            <h2
                                id="iter-title"
                                class="fw-bold mb-1 text-primary"
                            >
                                Loading...
                            </h2>
                            <p
                                id="iter-subtitle"
                                class="fs-5 text-muted mb-0"
                            ></p>
                        </div>
                        <div>
                            <button
                                id="open-upload-modal-btn"
                                class="btn btn-success hidden"
                                data-bs-toggle="modal"
                                data-bs-target="#uploadModal"
                            >
                                ⬆️ Upload File
                            </button>
                        </div>
                    </div>

                    <div
                        id="files-container"
                        class="list-group shadow-sm"
                    ></div>

                    <!-- Comments Mount Point -->
                    <div id="comments-mount"></div>
                </main>
            </div>
        </div>

        <!-- Upload Modal (Simplified since Year/Sem are known) -->
        <div
            class="modal fade"
            id="uploadModal"
            tabindex="-1"
            aria-hidden="true"
        >
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Upload Resource</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                            aria-label="Close"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <form id="upload-form">
                            <div class="mb-3">
                                <label class="form-label fw-semibold"
                                    >Resource Title *</label
                                >
                                <input
                                    type="text"
                                    class="form-control"
                                    id="file-title"
                                    required
                                />
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold"
                                    >Select File *</label
                                >
                                <input
                                    type="file"
                                    class="form-control"
                                    id="file-input"
                                    required
                                />
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold"
                                    >Description</label
                                >
                                <textarea
                                    class="form-control"
                                    id="file-description"
                                    rows="2"
                                ></textarea>
                            </div>
                            <button
                                type="submit"
                                class="btn btn-primary w-100"
                                id="submit-upload-btn"
                            >
                                Upload
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="./js/iteration.js"></script>
        <script type="module">
            import { mountSidebar } from "./js/sidebar.js";
            import "./js/iteration.js"; // Your existing script

            document.addEventListener("DOMContentLoaded", () => {
                mountSidebar("sidebar-mount");
            });
        </script>
    </body>
</html>
