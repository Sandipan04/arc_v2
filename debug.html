<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>System Debug | NISER Archive</title>

        <!-- 1. External Frameworks -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <!-- 2. Modular CSS -->
        <link rel="stylesheet" href="./css/global.css" />
        <link rel="stylesheet" href="./css/debug.css" />
    </head>
    <body>
        <!-- Fixed Navbar -->
        <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
            <div class="container">
                <a class="navbar-brand" href="/">NISER Archive</a>
                <div class="d-flex align-items-center ms-auto">
                    <a href="/" class="btn btn-outline-light btn-sm me-3"
                        >Back to Home</a
                    >
                    <div id="user-button-mount"></div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="container mb-5">
            <h2 class="mb-4 border-bottom pb-2">System Diagnostics</h2>

            <div class="row g-4">
                <!-- Database Stats Card -->
                <div class="col-md-6">
                    <div class="card h-100 shadow-sm border-0">
                        <div
                            class="card-header bg-white border-bottom-0 pt-4 pb-0"
                        >
                            <h5 class="card-title">
                                🗄️ Local D1 Database Metrics
                            </h5>
                        </div>
                        <div class="card-body">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Table Name</th>
                                        <th>Total Rows</th>
                                    </tr>
                                </thead>
                                <tbody id="db-stats-body">
                                    <tr>
                                        <td colspan="2" class="text-muted">
                                            Loading stats...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- User Session Profile Card -->
                <div class="col-md-6">
                    <div class="card h-100 shadow-sm border-0">
                        <div
                            class="card-header bg-white border-bottom-0 pt-4 pb-0"
                        >
                            <h5 class="card-title">
                                👤 Current Session Identity
                            </h5>
                        </div>
                        <div class="card-body d-flex flex-column">
                            <p class="text-muted small mb-2">
                                Raw JSON payload from your D1 database
                            </p>
                            <pre id="user-payload" class="flex-grow-1">
Sign in to view session data...</pre>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Sticky Footer -->
        <footer class="footer">
            <div class="container text-center text-muted">
                <small>System Diagnostics Page</small>
            </div>
        </footer>

        <!-- 3. Modular JS Entry Point -->
        <script type="module" src="./js/debug.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
