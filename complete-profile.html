<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Complete Profile | NISER Archive</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./css/global.css" />
        <link rel="stylesheet" href="./css/complete-profile.css" />
    </head>
    <body>
        <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
            <div class="container">
                <a class="navbar-brand" href="/">NISER Archive</a>
                <div id="user-button-mount" class="ms-auto"></div>
            </div>
        </nav>

        <main
            class="container mb-5 d-flex justify-content-center align-items-center"
            style="min-height: 70vh"
        >
            <div class="card shadow-sm w-100" style="max-width: 600px">
                <div class="card-body p-5">
                    <h2 class="card-title fw-bold text-center mb-4">
                        Complete Your Profile
                    </h2>
                    <p class="text-muted text-center mb-4">
                        You need to fill out your academic details before
                        accessing the archive.
                    </p>

                    <div
                        id="error-message"
                        class="alert alert-danger hidden"
                        role="alert"
                    ></div>

                    <form id="onboarding-form">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold"
                                >Display Name *</label
                            >
                            <input
                                type="text"
                                class="form-control"
                                id="username"
                                required
                            />
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label
                                    for="program"
                                    class="form-label fw-semibold"
                                    >Program *</label
                                >
                                <select
                                    class="form-select"
                                    id="program"
                                    required
                                >
                                    <option value="" disabled selected>
                                        Select program...
                                    </option>
                                    <option value="Int. MSc.">Int. MSc.</option>
                                    <option value="PhD">PhD</option>
                                    <option value="Faculty">Faculty</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label
                                    for="school"
                                    class="form-label fw-semibold"
                                    >School *</label
                                >
                                <select
                                    class="form-select"
                                    id="school"
                                    required
                                >
                                    <option value="" disabled selected>
                                        Select school...
                                    </option>
                                    <option value="SMS">SMS</option>
                                    <option value="SPS">SPS</option>
                                    <option value="SCS">SCS</option>
                                    <option value="SBS">SBS</option>
                                    <option value="SHSS">SHSS</option>
                                    <option value="SEES">SEES</option>
                                    <option value="SCIS">SCIS</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="batch" class="form-label fw-semibold"
                                >Batch (Year of Joining)</label
                            >
                            <input
                                type="number"
                                class="form-control"
                                id="batch"
                                placeholder="e.g. 2021"
                                min="2000"
                                max="2100"
                            />
                        </div>

                        <div class="mb-4">
                            <label for="about" class="form-label fw-semibold"
                                >About (Optional)</label
                            >
                            <textarea
                                class="form-control"
                                id="about"
                                rows="3"
                                maxlength="200"
                            ></textarea>
                        </div>

                        <div class="d-grid">
                            <button
                                type="submit"
                                class="btn btn-primary btn-lg"
                                id="submit-btn"
                            >
                                Save Profile
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>

        <script type="module" src="./js/complete-profile.js"></script>
    </body>
</html>
