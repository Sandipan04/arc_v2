<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>School Archive | NISER</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./css/global.css" />
        <link rel="stylesheet" href="./css/school.css" />
        <link rel="stylesheet" href="./css/sidebar.css" />
    </head>
    <body>
        <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
            <div class="container">
                <a class="navbar-brand" href="/">NISER Archive</a>
                <div class="d-flex align-items-center ms-auto">
                    <button
                        id="sign-in-btn"
                        class="btn btn-outline-light btn-sm me-3 hidden"
                    >
                        Sign In
                    </button>
                    <div id="user-button-mount"></div>
                </div>
            </div>
        </nav>

        <div class="container-fluid" style="margin-top: 56px">
            <!-- Mobile Toggle Button (Visible only on small screens) -->
            <div
                class="d-md-none py-2 border-bottom bg-white sticky-top"
                style="top: 56px; z-index: 1020"
            >
                <button
                    class="btn btn-light w-100 d-flex justify-content-between align-items-center"
                    type="button"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#sidebarMenu"
                    aria-controls="sidebarMenu"
                >
                    <span class="fw-bold text-muted">📁 Browse Directory</span>
                    <span>☰</span>
                </button>
            </div>

            <div class="row">
                <!-- Responsive Sidebar: Acts as an offcanvas drawer on mobile, and a standard column on desktop -->
                <nav
                    class="col-md-3 col-lg-2 offcanvas-md offcanvas-start sidebar-container"
                    tabindex="-1"
                    id="sidebarMenu"
                    aria-labelledby="sidebarMenuLabel"
                >
                    <div class="offcanvas-header d-md-none border-bottom">
                        <h5
                            class="offcanvas-title fw-bold text-primary"
                            id="sidebarMenuLabel"
                        >
                            Archive Directory
                        </h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="offcanvas"
                            data-bs-target="#sidebarMenu"
                            aria-label="Close"
                        ></button>
                    </div>
                    <div class="offcanvas-body flex-column pt-md-0">
                        <h6
                            class="d-none d-md-block text-muted fw-bold text-uppercase mb-3 px-2"
                        >
                            Directory
                        </h6>
                        <div id="sidebar-mount" class="w-100"></div>
                    </div>
                </nav>

                <!-- Main Content Column -->
                <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4 mb-5">
                    <!-- Breadcrumbs, Headers, and Course Grid go here -->
                    <!-- Breadcrumbs -->
                    <nav aria-label="breadcrumb" class="mb-4">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item">
                                <a href="/">Home</a>
                            </li>
                            <li
                                class="breadcrumb-item active"
                                aria-current="page"
                                id="breadcrumb-school"
                            >
                                Loading...
                            </li>
                        </ol>
                    </nav>

                    <!-- Header -->
                    <div
                        class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4"
                    >
                        <div>
                            <h2 id="school-title" class="mb-0">
                                Loading School...
                            </h2>
                            <p class="text-muted mb-0">
                                Select a course to view files and resources.
                            </p>
                        </div>
                        <div>
                            <button
                                id="open-course-modal-btn"
                                class="btn btn-success hidden"
                                data-bs-toggle="modal"
                                data-bs-target="#courseModal"
                            >
                                ➕ Add Course
                            </button>
                        </div>
                        <!-- Client-side filter for quick searching -->
                        <input
                            type="text"
                            id="course-filter"
                            class="form-control w-25"
                            placeholder="Filter courses..."
                        />
                    </div>

                    <!-- Course List -->
                    <div id="loading-spinner" class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>

                    <div class="row g-3" id="course-grid">
                        <!-- Course cards injected here via JS -->
                    </div>

                    <div id="empty-state" class="text-center py-5 hidden">
                        <p class="text-muted fs-5">
                            No courses found for this school yet.
                        </p>
                    </div>

                    <!-- Add Course Modal -->
                    <div
                        class="modal fade"
                        id="courseModal"
                        tabindex="-1"
                        aria-hidden="true"
                    >
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title">
                                        Suggest a New Course
                                    </h5>
                                    <button
                                        type="button"
                                        class="btn-close"
                                        data-bs-dismiss="modal"
                                        aria-label="Close"
                                    ></button>
                                </div>
                                <div class="modal-body">
                                    <div
                                        id="course-error"
                                        class="alert alert-danger hidden"
                                    ></div>
                                    <form id="course-form">
                                        <div class="mb-3">
                                            <label
                                                class="form-label fw-semibold"
                                                >Course Code *</label
                                            >
                                            <input
                                                type="text"
                                                class="form-control"
                                                id="course-code"
                                                placeholder="e.g. M201"
                                                required
                                            />
                                            <div class="form-text">
                                                Include the letter prefix and
                                                number.
                                            </div>
                                        </div>
                                        <div class="mb-4">
                                            <label
                                                class="form-label fw-semibold"
                                                >Course Title *</label
                                            >
                                            <input
                                                type="text"
                                                class="form-control"
                                                id="course-name"
                                                placeholder="e.g. Complex Analysis"
                                                required
                                            />
                                        </div>
                                        <div class="d-grid">
                                            <button
                                                type="submit"
                                                class="btn btn-primary"
                                                id="submit-course-btn"
                                            >
                                                Submit Course for Review
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Comments Mount Point -->
                    <div id="comments-mount"></div>
                </main>
            </div>
        </div>

        <footer class="footer mt-auto">
            <div class="container text-center text-muted">
                <small>Maintained by the student community.</small>
            </div>
        </footer>

        <script type="module" src="./js/school.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"
        ></script>
        <script type="module">
            import { mountSidebar } from "./js/sidebar.js";
            import "./js/school.js"; // Your existing script

            document.addEventListener("DOMContentLoaded", () => {
                mountSidebar("sidebar-mount");
            });
        </script>
    </body>
</html>
